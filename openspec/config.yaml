schema: spec-driven

context: |
  Project: quickTeams
  Purpose: Share reusable Claude Code and OpenSpec workflows so teammates can propose,
    design, and implement changes with a documented happy path.
  Key assets:
    - .claude/commands/opsx/*: slash-command entrypoints for OpenSpec workflows
    - .claude/skills/openspec-*: reusable skill definitions
    - openspec/changes/reliable-agent-team-workflow/*: demo change showing expected artifacts
    - .spec-workflow/*: optional template assets for richer spec workflows
  Assumptions:
    - OpenSpec CLI must be installed for opsx/openspec workflows to work
    - GitHub CLI is optional and only needed for remote repo / PR workflows
  Sharing boundary:
    - Keep generated artifacts repository-shareable; do not reference local machine paths,
      personal session state, chat-history files, or secrets.

rules:
  proposal:
    - Keep the proposal focused on why the change matters and which capabilities it adds or modifies.
  design:
    - Prefer practical implementation decisions over abstract architecture discussion.
  tasks:
    - Break work into small, verifiable steps that a new contributor can follow.
